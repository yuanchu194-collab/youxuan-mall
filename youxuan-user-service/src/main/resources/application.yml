server:
  port: 9010

spring:
  application:
    name: youxuan-user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/youxuan_mall?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

youxuan:
  jwt:
    secret: ${YOUXUAN_JWT_SECRET:youxuan-mall-dev-secret-key-for-stage-four-2026}
    expire-seconds: 86400
