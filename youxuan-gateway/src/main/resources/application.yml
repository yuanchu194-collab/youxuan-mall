server:
  port: 9000

spring:
  application:
    name: youxuan-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:3000"
              - "http://localhost:3000"
              - "http://127.0.0.1:5173"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 1800
      routes:
        - id: youxuan-user-service
          uri: lb://youxuan-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
        - id: youxuan-product-service
          uri: lb://youxuan-product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=2
        - id: youxuan-search-service
          uri: lb://youxuan-search-service
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=2
        - id: youxuan-coupon-service
          uri: lb://youxuan-coupon-service
          predicates:
            - Path=/api/coupon/**
          filters:
            - StripPrefix=2
        - id: youxuan-order-service
          uri: lb://youxuan-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2
        - id: youxuan-file-service
          uri: lb://youxuan-file-service
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=2
        - id: youxuan-cart-service
          uri: lb://youxuan-cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=2
        - id: youxuan-home-service
          uri: lb://youxuan-home-service
          predicates:
            - Path=/api/home/**
          filters:
            - StripPrefix=2

youxuan:
  jwt:
    secret: ${YOUXUAN_JWT_SECRET:youxuan-mall-dev-secret-key-for-stage-four-2026}
    expire-seconds: 86400
  gateway:
    auth:
      white-list:
        - "POST:/api/user/register"
        - "POST:/api/user/login"
        - "GET:/api/*/test/ping"
        - "GET:/api/home/index"
        - "GET:/api/product/category/list"
        - "GET:/api/product/home/hot"
        - "GET:/api/product/page"
        - "GET:/api/product/*"
        - "POST:/api/search/product"
        - "GET:/api/coupon/page"
